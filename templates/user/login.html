<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>登录 · CineRec</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    .login-wrap {
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
    }
    .login-box {
      width: 420px; padding: 48px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
    }
    .login-title {
      font-family: 'Cinzel', serif;
      font-size: 28px; color: var(--accent);
      letter-spacing: 3px; margin-bottom: 8px;
    }
    .login-sub { color: var(--text2); font-size: 13px; margin-bottom: 36px; }
    .login-footer { text-align: center; margin-top: 24px; font-size: 13px; color: var(--text2); }
    .login-footer a { color: var(--accent); }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-box fade-in">
    <div class="login-title">CINEREC</div>
    <div class="login-sub">发现属于你的电影世界</div>
    <div class="form-group">
      <label>用户名</label>
      <input id="username" class="form-control" placeholder="请输入用户名">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input id="password" class="form-control" type="password" placeholder="请输入密码">
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="doLogin()">
      登 录
    </button>
    <div class="login-footer">还没有账号？<a href="/register">立即注册</a></div>
  </div>
</div>
<script src="/static/js/main.js"></script>
<script>
async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  if (!username || !password) return toast('请填写完整', 'error');
  const res = await API.post('/api/user/login', { username, password });
  if (res.code === 200) {
    toast('登录成功');
    setTimeout(() => location.href = '/', 800);
  } else {
    toast(res.msg, 'error');
  }
}
document.addEventListener('keydown', e => e.key === 'Enter' && doLogin());
</script>
</body>
</html>
