<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>数据大屏 · CineRec Admin</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
  <style>
    .admin-layout { display:flex; min-height:100vh; }
    .sidebar {
      width:220px; position:fixed; left:0; top:0; bottom:0;
      background:var(--bg2); border-right:1px solid var(--border);
      padding-top:24px; z-index:100;
    }
    .sidebar-brand {
      font-family:'Cinzel',serif; color:var(--accent);
      font-size:14px; letter-spacing:2px;
      padding:0 24px 24px; border-bottom:1px solid var(--border);
    }
    .sidebar-brand span { display:block; font-size:10px; color:var(--text2); margin-top:2px; letter-spacing:1px; }
    .sidebar-nav { padding:16px 0; }
    .sidebar-link {
      display:block; padding:12px 24px;
      font-size:13px; color:var(--text2);
      transition:all .2s; cursor:pointer;
    }
    .sidebar-link:hover, .sidebar-link.active {
      color:var(--accent); background:rgba(226,185,111,0.06);
      border-left:2px solid var(--accent);
    }
    .admin-main { margin-left:220px; padding:40px; flex:1; }
    .stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-bottom:32px; }
    .stat-card {
      background:var(--bg2); border:1px solid var(--border);
      border-radius:var(--radius); padding:24px;
    }
    .stat-label { font-size:11px; color:var(--text2); letter-spacing:2px; margin-bottom:8px; }
    .stat-value { font-size:32px; font-weight:500; color:var(--accent); }
    .chart-grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
    .chart-box {
      background:var(--bg2); border:1px solid var(--border);
      border-radius:var(--radius); padding:20px;
    }
    .chart-title { font-size:12px; color:var(--text2); letter-spacing:2px; margin-bottom:16px; }
    .chart-full { grid-column:1/-1; }
    .login-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.7);
      display:flex; align-items:center; justify-content:center; z-index:200;
    }
    .login-box {
      width:380px; padding:40px; background:var(--bg2);
      border:1px solid var(--border); border-radius:16px;
    }
  </style>
</head>
<body>
<!-- 管理员登录弹窗 -->
<div id="login-overlay" class="login-overlay">
  <div class="login-box">
    <div style="font-family:'Cinzel',serif;font-size:20px;color:var(--accent);margin-bottom:24px;letter-spacing:2px">ADMIN LOGIN</div>
    <div class="form-group"><label>账号</label><input id="a-user" class="form-control" placeholder="admin"></div>
    <div class="form-group"><label>密码</label><input id="a-pwd" class="form-control" type="password" placeholder="admin123"></div>
    <button class="btn btn-primary" style="width:100%" onclick="adminLogin()">登录管理后台</button>
  </div>
</div>

<div class="admin-layout">
  <div class="sidebar">
    <div class="sidebar-brand">CINEREC<span>ADMIN PANEL</span></div>
    <div class="sidebar-nav">
      <a class="sidebar-link active" href="/admin">📊 数据大屏</a>
      <a class="sidebar-link"        href="/admin/users">👥 用户管理</a>
      <a class="sidebar-link"        href="/admin/movies">🎬 电影管理</a>
      <a class="sidebar-link"        href="/admin/comments">💬 评论管理</a>
      <div class="sidebar-link" style="margin-top:auto" onclick="adminLogout()">🚪 退出</div>
    </div>
  </div>

  <div class="admin-main">
    <div style="font-family:'Cinzel',serif;font-size:22px;color:var(--accent);letter-spacing:3px;margin-bottom:32px">
      DATA DASHBOARD
    </div>

    <div class="stat-grid" id="stat-grid">
      <div class="stat-card"><div class="stat-label">总用户数</div><div class="stat-value" id="s-users">-</div></div>
      <div class="stat-card"><div class="stat-label">电影数量</div><div class="stat-value" id="s-movies">-</div></div>
      <div class="stat-card"><div class="stat-label">评分总数</div><div class="stat-value" id="s-ratings">-</div></div>
      <div class="stat-card"><div class="stat-label">评论总数</div><div class="stat-value" id="s-comments">-</div></div>
    </div>

    <div class="chart-grid">
      <div class="chart-box chart-full">
        <div class="chart-title">近7天评分趋势</div>
        <div id="chart-daily" style="height:220px"></div>
      </div>
      <div class="chart-box">
        <div class="chart-title">电影类型分布</div>
        <div id="chart-genre" style="height:300px"></div>
      </div>
      <div class="chart-box">
        <div class="chart-title">评分分布</div>
        <div id="chart-rating" style="height:300px"></div>
      </div>
      <div class="chart-box chart-full">
        <div class="chart-title">Top 10 热门电影</div>
        <div id="chart-top" style="height:280px"></div>
      </div>
    </div>
  </div>
</div>

<script src="/static/js/main.js"></script>
<script>
async function adminLogin() {
  const r = await API.post('/api/admin/login', {
    username: document.getElementById('a-user').value,
    password: document.getElementById('a-pwd').value,
  });
  if (r.code === 200) {
    document.getElementById('login-overlay').style.display = 'none';
    loadDashboard();
  } else { toast(r.msg, 'error'); }
}

async function adminLogout() {
  await API.post('/api/admin/logout');
  location.reload();
}

async function loadDashboard() {
  const res = await API.get('/api/admin/dashboard');
  if (res.code !== 200) return;
  const d = res.data;

  // 统计数字
  document.getElementById('s-users').textContent    = d.summary.users.toLocaleString();
  document.getElementById('s-movies').textContent   = d.summary.movies.toLocaleString();
  document.getElementById('s-ratings').textContent  = d.summary.ratings.toLocaleString();
  document.getElementById('s-comments').textContent = d.summary.comments.toLocaleString();

  const opt = { textStyle:{color:'#9a9690'}, grid:{containLabel:true} };

  // 每日评分折线
  echarts.init(document.getElementById('chart-daily')).setOption({
    ...opt,
    xAxis:{ type:'category', data:d.daily_ratings.map(x=>x.date), axisLine:{lineStyle:{color:'#333'}} },
    yAxis:{ type:'value', splitLine:{lineStyle:{color:'#1a1e2a'}} },
    series:[{ type:'line', data:d.daily_ratings.map(x=>x.count),
      smooth:true, itemStyle:{color:'#e2b96f'},
      areaStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,
        colorStops:[{offset:0,color:'rgba(226,185,111,0.3)'},{offset:1,color:'rgba(226,185,111,0)'}]}} }],
    tooltip:{ trigger:'axis', backgroundColor:'#13161e', borderColor:'#333', textStyle:{color:'#e8e6e0'} }
  });

  // 类型饼图
  echarts.init(document.getElementById('chart-genre')).setOption({
    ...opt,
    tooltip:{ trigger:'item', backgroundColor:'#13161e', borderColor:'#333', textStyle:{color:'#e8e6e0'} },
    series:[{ type:'pie', radius:['40%','70%'],
      data:d.genre_dist,
      itemStyle:{ borderColor:'#0d0f14', borderWidth:2 },
      label:{ color:'#9a9690', fontSize:11 } }]
  });

  // 评分分布柱图
  const dist = d.rating_dist;
  echarts.init(document.getElementById('chart-rating')).setOption({
    ...opt,
    xAxis:{ type:'category', data:['1星','2星','3星','4星','5星'], axisLine:{lineStyle:{color:'#333'}} },
    yAxis:{ type:'value', splitLine:{lineStyle:{color:'#1a1e2a'}} },
    series:[{ type:'bar', data:[dist[1],dist[2],dist[3],dist[4],dist[5]],
      itemStyle:{color:'#7eb8f7', borderRadius:[4,4,0,0]} }],
    tooltip:{ trigger:'axis', backgroundColor:'#13161e', borderColor:'#333', textStyle:{color:'#e8e6e0'} }
  });

  // Top10 横向柱图
  const tops = d.top_movies.slice().reverse();
  echarts.init(document.getElementById('chart-top')).setOption({
    ...opt,
    xAxis:{ type:'value', splitLine:{lineStyle:{color:'#1a1e2a'}} },
    yAxis:{ type:'category', data:tops.map(m=>m.title.substring(0,18)), axisLine:{lineStyle:{color:'#333'}} },
    series:[{ type:'bar', data:tops.map(m=>m.avg_rating),
      itemStyle:{color:'#5cc98a', borderRadius:[0,4,4,0]} }],
    tooltip:{ trigger:'axis', backgroundColor:'#13161e', borderColor:'#333', textStyle:{color:'#e8e6e0'} }
  });
}

// 检查是否已登录
(async () => {
  const r = await API.get('/api/admin/dashboard');
  if (r.code === 200) {
    document.getElementById('login-overlay').style.display = 'none';
    loadDashboard();
  }
})();
</script>
</body>
</html>
