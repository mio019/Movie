<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>注册 · CineRec</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    .reg-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .reg-box { width:480px; padding:48px; background:var(--bg2); border:1px solid var(--border); border-radius:16px; }
    .reg-title { font-family:'Cinzel',serif; font-size:24px; color:var(--accent); letter-spacing:3px; margin-bottom:8px; }
    .reg-sub { color:var(--text2); font-size:13px; margin-bottom:32px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    select.form-control { appearance:none; cursor:pointer; }
  </style>
</head>
<body>
<div class="reg-wrap">
  <div class="reg-box fade-in">
    <div class="reg-title">JOIN CINEREC</div>
    <div class="reg-sub">创建账号，开启个性化推荐</div>
    <div class="form-group">
      <label>用户名 *</label>
      <input id="username" class="form-control" placeholder="4-20个字符">
    </div>
    <div class="form-group">
      <label>邮箱 *</label>
      <input id="email" class="form-control" type="email" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>密码 *</label>
      <input id="password" class="form-control" type="password" placeholder="至少6位">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>年龄</label>
        <input id="age" class="form-control" type="number" placeholder="可选">
      </div>
      <div class="form-group">
        <label>性别</label>
        <select id="gender" class="form-control">
          <option value="">请选择</option>
          <option value="M">男</option>
          <option value="F">女</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>职业</label>
      <input id="occupation" class="form-control" placeholder="可选，如学生、工程师">
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="doRegister()">注 册</button>
    <div style="text-align:center;margin-top:20px;font-size:13px;color:var(--text2)">
      已有账号？<a href="/login" style="color:var(--accent)">去登录</a>
    </div>
  </div>
</div>
<script src="/static/js/main.js"></script>
<script>
async function doRegister() {
  const data = {
    username:   document.getElementById('username').value.trim(),
    email:      document.getElementById('email').value.trim(),
    password:   document.getElementById('password').value,
    age:        parseInt(document.getElementById('age').value) || null,
    gender:     document.getElementById('gender').value,
    occupation: document.getElementById('occupation').value.trim(),
  };
  if (!data.username || !data.email || !data.password)
    return toast('请填写必填项', 'error');
  if (data.password.length < 6) return toast('密码至少6位', 'error');
  const res = await API.post('/api/user/register', data);
  if (res.code === 200) {
    toast('注册成功，即将跳转登录');
    setTimeout(() => location.href = '/login', 1200);
  } else { toast(res.msg, 'error'); }
}
</script>
</body>
</html>
